name: Update Scholar stats

on:
  schedule:
    - cron: '0 7 * * 1'   # every Monday at 07:00 UTC
  workflow_dispatch:        # allow manual trigger from the Actions tab

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install scholarly free-proxy

      - name: Fetch Scholar stats
        run: python scripts/fetch_scholar.py

      - name: Commit updated stats
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/scholar.json
          git diff --staged --quiet || git commit -m "chore: update Scholar stats [skip ci]"
          git push
